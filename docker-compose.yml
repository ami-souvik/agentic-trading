version: "3.9"

services:
  trader-api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./trader:/app/trader
    command: uvicorn trader.main:app --reload --host 0.0.0.0 --port 8000
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
