version: "3.9"

services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  trader-api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./trader:/app/trader
      # Bind-mount so logs written inside the container appear on the host at ./logs/
      # Tail them with: tail -f logs/trader.log
      - ./logs:/app/logs
    command: uvicorn trader.daily_run:main --reload --host 0.0.0.0 --port 8000
    depends_on:
      redis:
        condition: service_started
      dynamodb-setup:
        condition: service_completed_successfully
    environment:
      - REDIS_URL=redis://redis:6379
      # Point to local DynamoDB inside the compose network
      - DYNAMO_ENDPOINT_URL=http://dynamodb-local:8000
      # Dummy credentials — DynamoDB Local ignores them
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-local}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-local}
      # Log file path inside the container (bind-mounted to ./logs/ on host)
      - LOG_FILE=logs/trader.log

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── DynamoDB Local ──────────────────────────────────────────────────────────
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    ports:
      - "8001:8000" # Access from host at http://localhost:8001
    # -inMemory: no disk writes → avoids the volume permission error (the
    #   dynamodblocal user can't write to Docker-owned named volumes).
    # -sharedDb: one shared DB file for all credential combos.
    # Data lives only for the container's lifetime; dynamodb-setup re-creates
    # the table on every `docker-compose up`, so nothing is lost.
    #
    # Want persistence across restarts instead? Replace with:
    #   command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data"
    #   user: "0"          # run as root so it can write the named volume
    #   volumes:
    #     - dynamodb_data:/home/dynamodblocal/data
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    healthcheck:
      # DynamoDB Local responds on port 8000; bash TCP check avoids needing curl/wget
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000' 2>/dev/null" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Table initialisation (runs once on first start) ─────────────────────────
  dynamodb-setup:
    image: amazon/aws-cli:latest
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: ap-south-1
    # Use list form so the shell script string is passed verbatim to /bin/sh -c.
    # Backslash continuations keep the aws CLI call readable without YAML folding bugs.
    entrypoint:
      - /bin/sh
      - -c
      - |
        aws dynamodb create-table \
          --table-name nse_trader \
          --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://dynamodb-local:8000 \
        && echo "Table nse_trader created." \
        || echo "Table nse_trader already exists -- skipping."

  # ── DynamoDB Admin UI ───────────────────────────────────────────────────────
  # Browse and query the local table at http://localhost:8002
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    ports:
      - "8002:8001" # Web UI at http://localhost:8002
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: ap-south-1
    depends_on:
      dynamodb-local:
        condition: service_healthy

volumes:
  redis_data:
